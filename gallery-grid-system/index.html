<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Galeri Grid Sistemi</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <p class="eyebrow">Grid Practice</p>
        <h1>Galeri Grid Sistemi</h1>
        <p class="lead">
          Farklı boyutlarda görsel bloklarla kurulmuş, responsive ve dengeli bir galeri düzeni.
        </p>
      </section>

      <section class="gallery" aria-label="Galeri alanı">
        <article class="tile tile-wide">
          <span>01</span>
          <h2>Hero Görsel</h2>
        </article>
        <article class="tile">
          <span>02</span>
          <h2>Doğal Ton</h2>
        </article>
        <article class="tile tile-tall">
          <span>03</span>
          <h2>Dikey Blok</h2>
        </article>
        <article class="tile">
          <span>04</span>
          <h2>Minimal Kare</h2>
        </article>
        <article class="tile tile-wide">
          <span>05</span>
          <h2>Yatay Alan</h2>
        </article>
        <article class="tile">
          <span>06</span>
          <h2>Yumuşak Geçiş</h2>
        </article>
        <article class="tile">
          <span>07</span>
          <h2>Grid Ritmi</h2>
        </article>
        <article class="tile tile-tall">
          <span>08</span>
          <h2>Denge Noktası</h2>
        </article>
      </section>
    </main>
  </body>
</html>
